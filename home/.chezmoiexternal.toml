# Everything Claude Code (ECC) hook runtime — https://github.com/affaan-m/ECC
# Only scripts/hooks + scripts/lib are fetched here (the hook runtime that later PRs wire
# into settings.json). Adopted skills are deployed by the list-driven block below; ECC
# agents / rules are not adopted. The tarball is large, but chezmoi extracts only the
# included paths. Version pinned in .chezmoidata.toml [ecc].version.
[".agents/skills/ecc/scripts"]
    type = "archive"
    url = "https://github.com/affaan-m/ECC/archive/{{ .ecc.commit }}.tar.gz"
    stripComponents = 2
    include = ["*/scripts/hooks/**", "*/scripts/lib/**"]
    refreshPeriod = "168h"

# ECC adopted skills (#46/#15) — the reconciled 127-skill set lives in .chezmoidata.toml
# [ecc].skills. chezmoi ranges over it to emit one external entry per skill, all pulling
# from the SAME ECC tarball as the hook runtime above (cached by URL SHA256 → one download)
# and version-locked to [ecc].commit. Mirrors the anthropics/skills archive+include pattern;
# stripComponents=3 drops the `ECC-<commit>/skills/<name>/` prefix so files land directly
# under each ~/.agents/skills/<name>/. continuous-learning-v2 is in the list, so its full
# engine (hooks/scripts/agents) is deployed here; PR-B only wires the observer + enables it.
{{ range $skill := .ecc.skills -}}
[".agents/skills/{{ $skill }}"]
    type = "archive"
    url = "https://github.com/affaan-m/ECC/archive/{{ $.ecc.commit }}.tar.gz"
    stripComponents = 3
    include = ["*/skills/{{ $skill }}/**"]
    refreshPeriod = "168h"

{{ end -}}

# ECC `aside` slash command — the only command adopted from ECC (the other 83
# were rejected). Fetched verbatim instead of vendored, so this public MIT repo
# references rather than redistributes ECC's file (no third-party notice needed,
# same rationale as the hook runtime above). Pinned to the same [ecc].commit, so
# it stays version-locked with the runtime.
[".claude/commands/aside.md"]
    type = "file"
    url = "https://raw.githubusercontent.com/affaan-m/ECC/{{ .ecc.commit }}/commands/aside.md"
    refreshPeriod = "168h"

# Moralerspace font (macOS only)
# Version is defined in .chezmoidata.toml [versions.moralerspace_font]
{{ if eq .chezmoi.os "darwin" -}}
["Library/Fonts"]
    type = "archive"
    url = "https://github.com/yuru7/moralerspace/releases/download/v{{ .versions.moralerspace_font }}/Moralerspace_v{{ .versions.moralerspace_font }}.zip"
    stripComponents = 1
    include = ["*.ttf"]
    refreshPeriod = "672h"  # 28 days — fonts update infrequently; version pinned in .chezmoidata.toml
{{ end -}}

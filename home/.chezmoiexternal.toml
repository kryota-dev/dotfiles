# Official skills from https://github.com/anthropics/skills
# Pinned commit hash is defined in .chezmoidata.toml [skills.anthropic_commit]
# All entries share the same tarball URL — chezmoi caches by URL SHA256,
# so only one download occurs regardless of how many entries exist.

[".agents/skills/algorithmic-art"]
    type = "archive"
    url = "https://github.com/anthropics/skills/archive/{{ .skills.anthropic_commit }}.tar.gz"
    stripComponents = 3
    include = ["*/skills/algorithmic-art/**"]
    refreshPeriod = "168h"


[tools]
# Language runtimes (core backend)
node = "24.18.0"
python = "3.14.6"
ruby = "4.0.6"
go = "1.26.5"
deno = "2.9.3"
rust = "1.96.1"

# CLI tools (auto-selected via registry)
act = "0.2.89"
actionlint = "1.7.12"
aws-cli = "2.35.24"
bats = "1.13.0"
bun = "1.3.14"
chezmoi = "2.70.5"
claude = "2.1.211"
cloudflared = "2026.6.1"
direnv = "2.37.1"
fd = "10.4.2"
fzf = "0.74.0"
gcloud = "572.0.0"
gh = "2.96.0"
ghq = "1.10.1"
gitleaks = "8.30.1"
jq = "1.8.2"
mas = "7.0.0"
pinact = "4.1.0"
ripgrep = "15.1.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
starship = "1.26.0"
terraform = "1.15.8"
tmux = "3.6a"
uv = "0.11.28"
yazi = "26.5.6"
zoxide = "0.10.0"

# ubi-backed CLIs (no mise/aqua registry entry)
"ubi:googleworkspace/cli" = { version = "0.22.5", exe = "gws" }

# npm-backed CLIs (no registry entry). agent-browser ships its specialized skills
# (electron/slack/dogfood/...) via `agent-browser skills get`, so they are loaded at
# runtime instead of being vendored; only the discovery stub is chezmoi-managed.
"npm:agent-browser" = "0.31.2"
# happy (slopus/happy): a wrapper that runs Claude Code / Codex with phone control and
# end-to-end encryption (`happy claude` / `happy codex`). CLI only; the mobile/web apps
# are installed separately and paired at runtime.
"npm:happy" = "1.1.10"
pandoc = "3.10"
typst = "0.15.0"

[settings]
# Pin precompiled CPython to a flavor that ships lib/; latest mise otherwise
# selects freethreaded+install_only_stripped, which omits lib/ and fails with
# "Python installation is missing a `lib` directory" on fresh installs (see #121, #104).
python.precompiled_flavor = "install_only"
# Use precompiled ruby; a source build deadlocks on fresh installs without a
# baseruby on PATH, because ruby-build's configure probe re-enters the mise
# shim for the in-progress version and blocks on the install lock (see #122).
ruby.compile = false

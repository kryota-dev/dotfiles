name: Setup Validation

on:
  push:
    branches: [main]
    paths:
      - 'home/**'
      - '.chezmoiroot'
      - '.brewfile-linux-exclude'
      - '.github/workflows/setup-validation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'home/**'
      - '.chezmoiroot'
      - '.brewfile-linux-exclude'
      - '.github/workflows/setup-validation.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  setup-validation-macos:
    name: Validate dotfiles setup (macOS)
    runs-on: macos-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache Homebrew
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /opt/homebrew/Cellar
            /opt/homebrew/opt
            /opt/homebrew/Library/Taps
            ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-${{ hashFiles('home/dot_Brewfile') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Relink cached Homebrew formulas
        run: |
          grep -E '^brew ' home/dot_Brewfile \
            | sed 's/brew "\([^"]*\)".*/\1/' \
            | while IFS= read -r pkg; do
                name=$(basename "$pkg")
                if [ -d "/opt/homebrew/Cellar/$name" ]; then
                  brew link --overwrite "$name" 2>/dev/null \
                    || echo "Warning: failed to relink $name (will be handled by brew bundle)"
                fi
              done

      - name: Exclude CI-incompatible files
        run: |
          mkdir -p /tmp/chezmoi-excluded
          for f in \
            home/private_dot_aws/config.tmpl \
            home/dot_config/zsh/private_claude-secrets.zsh.tmpl \
            home/run_once_before_00-install-prerequisites.sh.tmpl \
            home/run_onchange_before_10-brew-bundle.sh.tmpl \
            home/run_once_after_11-validate-1password.sh.tmpl \
            home/run_once_after_30-setup-fonts.sh.tmpl \
            home/run_once_after_90-other-apps.sh.tmpl; do
            if [ -f "$f" ]; then
              mv "$f" /tmp/chezmoi-excluded/
              echo "Excluded: $f"
            fi
          done

      - name: Install Homebrew formulas only
        run: |
          grep -E '^(tap |brew )' home/dot_Brewfile > /tmp/Brewfile.ci
          brew bundle --no-upgrade --file=/tmp/Brewfile.ci

      - name: Cache mise tool installations
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/mise/installs
          key: ${{ runner.os }}-mise-${{ hashFiles('home/dot_config/mise/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: Apply dotfiles with chezmoi
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3; do
            if installer=$(curl -fsLS get.chezmoi.io) && [ -n "$installer" ]; then
              break
            elif [ "$attempt" -lt 3 ]; then
              echo "Failed to download chezmoi installer (attempt ${attempt}/3), retrying..."
              sleep $((attempt * 5))
            else
              echo "ERROR: Failed to download chezmoi installer after 3 attempts."
              exit 1
            fi
          done
          sh -c "$installer" -- init --apply --source="$(pwd)"

      - name: Verify mise tools
        run: |
          eval "$(brew shellenv)"
          eval "$(mise activate bash)"
          echo "==> Verifying key tools..."
          mise_dir="$HOME/.local/share/mise/installs"
          for tool in node python go; do
            tool_path=$(which "$tool")
            echo "$tool: $tool_path"
            if [[ "$tool_path" != *"$mise_dir"* && "$tool_path" != *".local/share/mise"* ]]; then
              echo "ERROR: $tool is not managed by mise (expected path under $mise_dir)"
              exit 1
            fi
          done
          node --version
          python3 --version
          go version

      - name: Verify deployed files
        run: |
          files=(
            ~/.zshrc
            ~/.zprofile
            ~/.gitconfig
            ~/.ssh/config
            ~/.config/starship.toml
            ~/.config/sheldon/plugins.toml
            ~/.config/ghostty/config
            ~/.config/mise/config.toml
          )
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
              exit 1
            fi
          done

      - name: Verify zsh modules deployed
        run: |
          for mod in aliases git docker claude functions completions wtp ghq; do
            f=~/.config/zsh/${mod}.zsh
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
              exit 1
            fi
          done

      - name: Verify ghq config applied
        run: |
          ghq_root=$(git config --type path --global --get ghq.root || true)
          ghq_user=$(git config --global --get ghq.user || true)
          if [ "$ghq_root" != "$HOME/ghq" ]; then
            echo "ghq.root mismatch: expected $HOME/ghq, got $ghq_root"
            exit 1
          fi
          if [ "$ghq_user" != "kryota-dev" ]; then
            echo "ghq.user mismatch: expected kryota-dev, got $ghq_user"
            exit 1
          fi
          if [ ! -f ~/.config/zsh/completions/_ghq ]; then
            echo "MISSING: ~/.config/zsh/completions/_ghq"
            exit 1
          fi
          echo "OK: ghq config (root=$ghq_root, user=$ghq_user) and _ghq completion deployed"

      - name: Verify zsh shell starts
        run: |
          zsh_stderr=$(zsh -i -c exit 2>&1 >/dev/null) || true
          if echo "$zsh_stderr" | grep -qE 'command not found|parse error|not found'; then
            echo "ERROR: zsh startup errors detected:"
            echo "$zsh_stderr"
            exit 1
          fi
          echo "OK: zsh starts cleanly"
        timeout-minutes: 2

  guard-ruby-no-baseruby:
    name: Guard ruby install without baseruby
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Remove every ruby from PATH (reproduce the fresh-install condition)
        run: |
          # The ruby source-build deadlock (#122) only manifests with no baseruby
          # on PATH: ruby-build's configure probe re-enters the mise shim for the
          # in-progress version and blocks on the install lock. Standard runners
          # ship a system ruby, so strip every ruby off PATH to reproduce it.
          while p=$(command -v ruby 2>/dev/null); do sudo rm -f "$p"; done
          if command -v ruby >/dev/null 2>&1; then
            echo "ERROR: ruby is still on PATH: $(command -v ruby)"
            exit 1
          fi
          echo "OK: no ruby on PATH"

      - name: Install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Deploy the repo mise config
        run: |
          # Exercise the actual pinned ruby version and [settings] (ruby.compile = false).
          mkdir -p ~/.config/mise
          cp home/dot_config/mise/config.toml ~/.config/mise/config.toml

      - name: Install ruby with a hard timeout (fails fast if not precompiled)
        run: |
          # With ruby.compile = false the precompiled binary installs in a few
          # minutes. If that setting is ever removed or overridden, a source build
          # deadlocks here without a baseruby; the timeout turns that indefinite
          # hang into a fast, deterministic failure instead of a 6-hour job.
          timeout 600 mise install ruby
          mise exec ruby -- ruby --version

  setup-validation-ubuntu:
    name: Validate dotfiles setup (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linuxbrew prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file git zsh

      - name: Cache Linuxbrew
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /home/linuxbrew/.linuxbrew
          key: ${{ runner.os }}-linuxbrew-${{ hashFiles('home/dot_Brewfile') }}
          restore-keys: |
            ${{ runner.os }}-linuxbrew-

      - name: Install Homebrew (Linuxbrew)
        run: |
          if [ ! -d /home/linuxbrew/.linuxbrew/bin ]; then
            NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          # Refresh Homebrew on cache hits: the cached install otherwise pins an
          # old snapshot whose cask API parser crashes with
          # "undefined method 'first' for nil" (cask.rb) when brew bundle checks
          # cask conflicts for formulas like aqua/lychee. See #104.
          brew update --force --quiet
          brew --version

      - name: Install Homebrew formulas only
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          grep -E '^(tap |brew )' home/dot_Brewfile \
            | grep -v -E -f .brewfile-linux-exclude \
            > /tmp/Brewfile.ci
          brew bundle --no-upgrade --file=/tmp/Brewfile.ci

      - name: Cache mise tool installations
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/mise/installs
          key: ${{ runner.os }}-mise-${{ hashFiles('home/dot_config/mise/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: Exclude CI-incompatible files
        run: |
          mkdir -p /tmp/chezmoi-excluded
          for f in \
            home/private_dot_aws/config.tmpl \
            home/dot_config/zsh/private_claude-secrets.zsh.tmpl \
            home/run_once_before_00-install-prerequisites.sh.tmpl \
            home/run_onchange_before_10-brew-bundle.sh.tmpl \
            home/run_once_after_11-validate-1password.sh.tmpl; do
            if [ -f "$f" ]; then
              mv "$f" /tmp/chezmoi-excluded/
              echo "Excluded: $f"
            fi
          done

      - name: Apply dotfiles with chezmoi
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          for attempt in 1 2 3; do
            if installer=$(curl -fsLS get.chezmoi.io) && [ -n "$installer" ]; then
              break
            elif [ "$attempt" -lt 3 ]; then
              echo "Failed to download chezmoi installer (attempt ${attempt}/3), retrying..."
              sleep $((attempt * 5))
            else
              echo "ERROR: Failed to download chezmoi installer after 3 attempts."
              exit 1
            fi
          done
          sh -c "$installer" -- init --apply --source="$(pwd)"

      - name: Verify mise tools
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          eval "$(mise activate bash)"
          echo "==> Verifying key tools..."
          mise_dir="$HOME/.local/share/mise/installs"
          for tool in node python go; do
            tool_path=$(which "$tool")
            echo "$tool: $tool_path"
            if [[ "$tool_path" != *"$mise_dir"* && "$tool_path" != *".local/share/mise"* ]]; then
              echo "ERROR: $tool is not managed by mise (expected path under $mise_dir)"
              exit 1
            fi
          done
          node --version
          python3 --version
          go version

      - name: Verify deployed files
        run: |
          files=(
            ~/.zshrc
            ~/.zprofile
            ~/.gitconfig
            ~/.ssh/config
            ~/.config/starship.toml
            ~/.config/sheldon/plugins.toml
            ~/.config/mise/config.toml
          )
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
              exit 1
            fi
          done

      - name: Verify zsh modules deployed
        run: |
          for mod in aliases git docker claude functions completions wtp ghq; do
            f=~/.config/zsh/${mod}.zsh
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
              exit 1
            fi
          done

      - name: Verify ghq config applied
        run: |
          ghq_root=$(git config --type path --global --get ghq.root || true)
          ghq_user=$(git config --global --get ghq.user || true)
          if [ "$ghq_root" != "$HOME/ghq" ]; then
            echo "ghq.root mismatch: expected $HOME/ghq, got $ghq_root"
            exit 1
          fi
          if [ "$ghq_user" != "kryota-dev" ]; then
            echo "ghq.user mismatch: expected kryota-dev, got $ghq_user"
            exit 1
          fi
          if [ ! -f ~/.config/zsh/completions/_ghq ]; then
            echo "MISSING: ~/.config/zsh/completions/_ghq"
            exit 1
          fi
          echo "OK: ghq config (root=$ghq_root, user=$ghq_user) and _ghq completion deployed"

      - name: Verify zsh shell starts
        run: |
          zsh_stderr=$(zsh -i -c exit 2>&1 >/dev/null) || true
          if echo "$zsh_stderr" | grep -qE 'command not found|parse error|not found'; then
            echo "ERROR: zsh startup errors detected:"
            echo "$zsh_stderr"
            exit 1
          fi
          echo "OK: zsh starts cleanly"
        timeout-minutes: 2

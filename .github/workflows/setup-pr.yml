name: Setup PR
on:
  pull_request:
    branches: [main]
    types: [opened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  auto-assign:
    permissions:
      pull-requests: write
    uses: kryota-dev/actions/.github/workflows/auto-assign-pr.yml@b72de173fed12f43bada4257182e977b750495d8 # v0.2.5
    with:
      bot-assignees: "kryota-dev"

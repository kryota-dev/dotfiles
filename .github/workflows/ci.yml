name: CI

on:
  push:
    branches: [main]
    paths:
      - 'home/**'
      - 'tests/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'home/**'
      - 'tests/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install shfmt
        run: |
          SHFMT_VERSION=3.13.1
          curl -sS -L "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: Run shellcheck on scripts
        run: |
          find home \( -name '*.sh' -o -name '*.sh.tmpl' \) ! -name 'symlink_*' | while read -r f; do
            sed '/{{/d' "$f" | shellcheck --shell=bash --exclude=SC1091,SC2034,SC2086,SC2317,SC2329 -
          done

      - name: Run shfmt check
        run: |
          find home \( -name '*.sh' -o -name '*.sh.tmpl' \) ! -name 'symlink_*' | while read -r f; do
            sed '/{{/d' "$f" | shfmt -d -i 2 -ci
          done

      - name: Install zsh
        run: sudo apt-get install -y zsh

      - name: Check zsh syntax
        run: |
          for f in home/dot_config/zsh/*.zsh; do
            zsh -n "$f" || exit 1
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: lint
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck zsh

      - name: Run Bats tests
        run: bats tests/*.bats

  sync-ghq-completion:
    name: Sync ghq completion
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Same-repo PRs only: fork PRs would receive a read-only GITHUB_TOKEN
    # (so the push step would fail anyway), but skipping them up front avoids
    # executing fork-side Makefile code in CI.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Run sync-ghq-completion
        run: make sync-ghq-completion

      - name: Commit & push if changed
        run: |
          if git diff --quiet home/dot_config/zsh/completions/_ghq; then
            echo "No change to _ghq; skipping commit."
            exit 0
          fi
          version=$(scripts/ghq-version.sh)
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add home/dot_config/zsh/completions/_ghq
          git commit -m "chore: sync _ghq completion for ghq v${version}"
          git push

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'home/**'
      - 'tests/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'home/**'
      - 'tests/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install shfmt
        run: |
          SHFMT_VERSION=3.13.0
          curl -sS -L "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: Run shellcheck on scripts
        run: |
          find home \( -name '*.sh' -o -name '*.sh.tmpl' \) | while read -r f; do
            sed '/{{/d' "$f" | shellcheck --shell=bash --exclude=SC1091,SC2034,SC2086,SC2317,SC2329 -
          done

      - name: Run shfmt check
        run: |
          find home \( -name '*.sh' -o -name '*.sh.tmpl' \) | while read -r f; do
            sed '/{{/d' "$f" | shfmt -d -i 2 -ci
          done

      - name: Install zsh
        run: sudo apt-get install -y zsh

      - name: Check zsh syntax
        run: |
          for f in home/dot_config/zsh/*.zsh; do
            zsh -n "$f" || exit 1
          done

  test:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: brew install bats-core chezmoi shellcheck

      - name: Run Bats tests
        run: bats tests/*.bats

  benchmark:
    name: Benchmark
    runs-on: macos-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: brew install chezmoi sheldon starship

      - name: Setup sheldon
        run: |
          mkdir -p ~/.config/sheldon ~/.config/zsh
          cp home/dot_config/sheldon/plugins.toml ~/.config/sheldon/plugins.toml
          cp home/dot_config/zsh/*.zsh ~/.config/zsh/
          for f in home/dot_config/zsh/*.zsh.tmpl; do
            [ -e "$f" ] || continue
            chezmoi execute-template -f "$f" > ~/.config/zsh/"$(basename "${f%.tmpl}")"
          done
          echo 'eval "$(sheldon source)"' > ~/.zshrc
          sheldon lock

      - name: Benchmark zsh startup
        run: |
          echo "=== Zsh Startup Benchmark ==="
          for i in $(seq 1 10); do
            /usr/bin/time zsh -i -c exit 2>&1
          done

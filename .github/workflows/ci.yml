name: CI

on:
  push:
    branches: [main]
    paths:
      - 'home/**'
      - 'tests/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'home/**'
      - 'tests/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install shfmt
        run: |
          SHFMT_VERSION=3.13.1
          curl -sS -L "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: Run shellcheck on scripts
        run: |
          find home \( -name '*.sh' -o -name '*.sh.tmpl' \) | while read -r f; do
            sed '/{{/d' "$f" | shellcheck --shell=bash --exclude=SC1091,SC2034,SC2086,SC2317,SC2329 -
          done

      - name: Run shfmt check
        run: |
          find home \( -name '*.sh' -o -name '*.sh.tmpl' \) | while read -r f; do
            sed '/{{/d' "$f" | shfmt -d -i 2 -ci
          done

      - name: Install zsh
        run: sudo apt-get install -y zsh

      - name: Check zsh syntax
        run: |
          for f in home/dot_config/zsh/*.zsh; do
            zsh -n "$f" || exit 1
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: lint
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck zsh

      - name: Run Bats tests
        run: bats tests/*.bats

name: Actions Lint
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**/*.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    permissions:
      contents: read
      pull-requests: write
    uses: kryota-dev/actions/.github/workflows/actions-lint.yml@0543a5553cf56bf46ff4a15ac9c8f25c9ecf02f2 # v0.1.0

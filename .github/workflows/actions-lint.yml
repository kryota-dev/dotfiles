name: Actions Lint
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**/*.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    permissions:
      contents: read
      pull-requests: write
    uses: kryota-dev/actions/.github/workflows/actions-lint.yml@f8009e36b4c6db991e969e3052b87ee8c6577531 # v0.2.3

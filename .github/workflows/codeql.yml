name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: kryota-dev/actions/.github/workflows/codeql-analysis.yml@1b0a97fd1b3e970f119d09fd2949be8d7fc45959 # v0.2.4
